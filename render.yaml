services:
  # --- THE BACKEND (The Brain) ---
  - type: web
    name: adarsha-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/instance/school.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: "5000"
      - key: FRONTEND_URL
        value: https://adarsha-frontend.onrender.com # The Public URL

  # --- THE FRONTEND (The Face) ---
  - type: web
    name: adarsha-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://adarsha-backend.onrender.com # The Public URL
      - key: PORT
        value: "3000"
