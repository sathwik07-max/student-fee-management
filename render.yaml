services:
  # --- THE BACKEND (The Brain) ---
  - type: web
    name: adarsha-backend
    env: docker
    dockerContext: backend
    dockerCommand: python app.py
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/backend/instance/school.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          name: adarsha-frontend
          type: web
          property: host

  # --- THE FRONTEND (The Face) ---
  - type: web
    name: adarsha-frontend
    env: docker
    dockerContext: frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: adarsha-backend
          type: web
          property: host
