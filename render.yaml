services:
  # --- THE BACKEND (The Brain) ---
  - type: web
    name: adarsha-backend
    env: docker
    dockerContext: backend  # Tells Render: "Go into the 'backend' folder first"
    dockerfilePath: Dockerfile # Tells Render: "The file is right here named 'Dockerfile'"
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/instance/school.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: "5000"

  # --- THE FRONTEND (The Face) ---
  - type: web
    name: adarsha-frontend
    env: docker
    dockerContext: frontend # Tells Render: "Go into the 'frontend' folder first"
    dockerfilePath: Dockerfile # Tells Render: "The file is right here named 'Dockerfile'"
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: adarsha-backend
          type: web
          property: host
      - key: PORT
        value: "3000"
