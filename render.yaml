services:
  # --- THE BACKEND (The Brain) ---
  - type: web
    name: adarsha-backend
    env: docker
    dockerContext: .  # Stand in the root folder
    dockerfilePath: backend/Dockerfile # Look for the file inside 'backend'
    plan: free
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/instance/school.db
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PORT
        value: "5000"

  # --- THE FRONTEND (The Face) ---
  - type: web
    name: adarsha-frontend
    env: docker
    dockerContext: . # Stand in the root folder
    dockerfilePath: frontend/Dockerfile # Look for the file inside 'frontend'
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: adarsha-backend
          type: web
          property: host
      - key: PORT
        value: "3000"
